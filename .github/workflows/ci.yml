name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: >-
          mypy cloud_analysis cloud_security_lab cloud_findings cloud_incidents cloud_rules
          iam_analyzer storage_analyzer
          network_analyzer cloudtrail_detector report_generator

      - name: Test with branch coverage
        run: coverage run -m unittest discover && coverage report

      - name: Verify deterministic end-to-end pipeline
        run: >-
          python -m cloud_security_lab demo --report-date 2026-06-30 &&
          cmp reports/cloud_security_report_sample.md reports/generated/cloud_security_report.md

      - name: Verify deterministic rule catalog documentation
        run: >-
          python -m cloud_security_lab catalog
          --output reports/generated/rule_catalog.md &&
          cmp docs/rule-catalog.md reports/generated/rule_catalog.md

      - name: Verify native IAM input pipeline
        run: >-
          python -m cloud_security_lab analyze iam
          sample_data/aws/iam/account_authorization_details.json
          --input-format aws
          --credential-report sample_data/aws/iam/credential_report.csv
          --as-of 2026-06-30
          --normalized-output reports/generated/normalized_iam_environment.json
          --output reports/generated/native_iam_findings.json
          --summary-output reports/generated/native_iam_analysis_summary.json

      - name: Verify native S3 input pipeline
        run: >-
          python -m cloud_security_lab analyze storage
          sample_data/aws/s3/s3_security_evidence_bundle.json
          --input-format aws
          --normalized-output reports/generated/normalized_storage_environment.json
          --output reports/generated/native_storage_findings.json
          --summary-output reports/generated/native_storage_analysis_summary.json

      - name: Verify native EC2 input pipeline
        run: >-
          python -m cloud_security_lab analyze network
          sample_data/aws/ec2/describe_security_groups.json
          --input-format aws
          --reachability-context sample_data/aws/ec2/network_reachability_context.json
          --normalized-output reports/generated/normalized_network_environment.json
          --output reports/generated/native_network_findings.json
          --summary-output reports/generated/native_network_analysis_summary.json

      - name: Verify native CloudTrail input pipeline
        run: >-
          python -m cloud_security_lab analyze cloudtrail
          sample_data/aws/cloudtrail/111122223333_CloudTrail_20260630T0200Z_part1.json
          sample_data/aws/cloudtrail/111122223333_CloudTrail_20260630T0300Z_part2.json.gz
          --input-format aws
          --normalized-output reports/generated/normalized_cloudtrail_environment.json
          --output reports/generated/native_cloudtrail_findings.json
          --incidents-output reports/generated/native_cloudtrail_incidents.json
          --summary-output reports/generated/native_cloudtrail_analysis_summary.json

      - name: Build wheel and source distribution
        if: matrix.python-version == '3.13'
        run: python -m build

      - name: Verify wheel contains the rule catalog
        if: matrix.python-version == '3.13'
        run: >-
          python -c "import glob, zipfile;
          wheel = glob.glob('dist/*.whl')[0];
          assert 'cloud_rules/rules-v1.0.json'
          in zipfile.ZipFile(wheel).namelist()"
