name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: >-
          mypy cloud_security_lab cloud_findings iam_analyzer storage_analyzer
          network_analyzer cloudtrail_detector report_generator

      - name: Test with branch coverage
        run: coverage run -m unittest discover && coverage report

      - name: Verify deterministic end-to-end pipeline
        run: >-
          python -m cloud_security_lab demo --report-date 2026-06-30 &&
          cmp reports/cloud_security_report_sample.md reports/generated/cloud_security_report.md

      - name: Verify native IAM input pipeline
        run: >-
          python -m cloud_security_lab analyze iam
          sample_data/aws/iam/account_authorization_details.json
          --input-format aws
          --credential-report sample_data/aws/iam/credential_report.csv
          --as-of 2026-06-30
          --normalized-output reports/generated/normalized_iam_environment.json
          --output reports/generated/native_iam_findings.json

      - name: Build wheel and source distribution
        if: matrix.python-version == '3.13'
        run: python -m build
