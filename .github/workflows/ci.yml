name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install project and development tools
        run: |
          python -m pip install --require-hashes -r requirements-dev.lock
          python -m pip install --no-build-isolation --no-deps -e .
          python -m pip check

      - name: Lint
        run: ruff check .

      - name: Type check
        run: >-
          mypy cloud_analysis cloud_benchmarks cloud_security_lab cloud_findings
          cloud_inputs cloud_incidents cloud_remediation cloud_rules cloud_timeline
          iam_analyzer storage_analyzer
          network_analyzer cloudtrail_detector report_generator tools

      - name: Lint Markdown
        if: matrix.python-version == '3.13'
        run: pymarkdown --strict-config scan --respect-gitignore .

      - name: Verify internal Markdown links
        if: matrix.python-version == '3.13'
        run: python -m tools.check_markdown_links internal

      - name: Verify external Markdown links
        if: matrix.python-version == '3.13'
        run: python -m tools.check_markdown_links external

      - name: Test with branch coverage
        run: >-
          mkdir -p reports/generated &&
          coverage run -m unittest discover &&
          coverage report &&
          coverage json -o reports/generated/coverage.json &&
          python -m cloud_benchmarks.coverage_gate
          reports/generated/coverage.json

      - name: Verify functional, fault-tolerance, and scale benchmarks
        run: >-
          python -m cloud_benchmarks.runner
          --output reports/generated/benchmark_results.json

      - name: Verify deterministic end-to-end pipeline
        run: >-
          python -m cloud_security_lab demo --report-date 2026-06-30 &&
          cmp reports/cloud_security_report_sample.md reports/generated/cloud_security_report.md

      - name: Verify deterministic rule catalog documentation
        run: >-
          python -m cloud_security_lab catalog
          --output reports/generated/rule_catalog.md &&
          cmp docs/rule-catalog.md reports/generated/rule_catalog.md

      - name: Verify native IAM input pipeline
        run: >-
          python -m cloud_security_lab analyze iam
          sample_data/aws/iam/account_authorization_details.json
          --input-format aws
          --credential-report sample_data/aws/iam/credential_report.csv
          --as-of 2026-06-30
          --normalized-output reports/generated/normalized_iam_environment.json
          --output reports/generated/native_iam_findings.json
          --summary-output reports/generated/native_iam_analysis_summary.json

      - name: Verify native S3 input pipeline
        run: >-
          python -m cloud_security_lab analyze storage
          sample_data/aws/s3/s3_security_evidence_bundle.json
          --input-format aws
          --normalized-output reports/generated/normalized_storage_environment.json
          --output reports/generated/native_storage_findings.json
          --summary-output reports/generated/native_storage_analysis_summary.json

      - name: Verify native EC2 input pipeline
        run: >-
          python -m cloud_security_lab analyze network
          sample_data/aws/ec2/describe_security_groups.json
          --input-format aws
          --reachability-context sample_data/aws/ec2/network_reachability_context.json
          --region ap-southeast-2
          --normalized-output reports/generated/normalized_network_environment.json
          --output reports/generated/native_network_findings.json
          --summary-output reports/generated/native_network_analysis_summary.json

      - name: Verify native CloudTrail input pipeline
        run: >-
          python -m cloud_security_lab analyze cloudtrail
          sample_data/aws/cloudtrail/111122223333_CloudTrail_20260630T0200Z_part1.json
          sample_data/aws/cloudtrail/111122223333_CloudTrail_20260630T0300Z_part2.json.gz
          --input-format aws
          --normalized-output reports/generated/normalized_cloudtrail_environment.json
          --output reports/generated/native_cloudtrail_findings.json
          --incidents-output reports/generated/native_cloudtrail_incidents.json
          --summary-output reports/generated/native_cloudtrail_analysis_summary.json

      - name: Build wheel and source distribution
        if: matrix.python-version == '3.13'
        run: python -m build --no-isolation

      - name: Verify wheel contains packaged contracts and catalogs
        if: matrix.python-version == '3.13'
        run: >-
          python -c "import glob, zipfile;
          wheel = glob.glob('dist/*.whl')[0];
          names = zipfile.ZipFile(wheel).namelist();
          assert 'cloud_benchmarks/benchmark-manifest-v1.0.json' in names;
          assert 'cloud_benchmarks/runner.py' in names;
          assert 'cloud_inputs/bounds.py' in names;
          assert 'cloud_inputs/validation.py' in names;
          assert 'cloud_rules/rules-v1.0.json' in names;
          assert 'cloud_remediation/plan.py' in names;
          assert 'cloud_timeline/timeline.py' in names;
          assert any(name.endswith(
          '/schemas/remediation-plan-v1.0.schema.json') for name in names);
          assert any(name.endswith(
          '/schemas/attack-timeline-v1.0.schema.json') for name in names);
          assert any(name.endswith(
          '/schemas/findings-v2.0.schema.json') for name in names);
          assert any(name.endswith(
          '/schemas/benchmark-manifest-v1.0.schema.json') for name in names);
          assert any(name.endswith(
          '/schemas/benchmark-results-v1.0.schema.json') for name in names);
          assert any(name.endswith(
          '/sample_data/aws/fixture-manifest-v1.0.json') for name in names)"
